name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install linters
        run: pip install black isort
      - name: black
        run: black --check paged_eviction tests examples benchmarks
      - name: isort
        run: isort --check-only paged_eviction tests examples benchmarks

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: |
          pip install mypy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: mypy
        run: mypy paged_eviction --ignore-missing-imports --no-site-packages

  unit-tests:
    name: unit-tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest
          pip install -e .
      - name: test
        run: pytest tests/ -v --tb=short

  dry-run:
    name: dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: run dry-run
        run: python examples/offline_inference.py --dry-run
