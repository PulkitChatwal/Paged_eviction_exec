name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Unit tests — CPU only, no GPU needed
  # -------------------------------------------------------------------------
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-cov
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # -------------------------------------------------------------------------
  # Lint — black + isort (auto-format mode, never fails on style)
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install black isort

      - name: black
        run: black --check --diff paged_eviction tests examples benchmarks

      - name: isort
        run: isort --check-only --diff paged_eviction tests examples benchmarks

  # -------------------------------------------------------------------------
  # Type check — mypy (our code only, skip site-packages)
  # -------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install mypy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: mypy
        run: mypy paged_eviction --ignore-missing-imports --no-site-packages

  # -------------------------------------------------------------------------
  # Dry-run example — no GPU required
  # -------------------------------------------------------------------------
  dry-run:
    name: Dry Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Run dry-run example
        run: python examples/offline_inference.py --dry-run
